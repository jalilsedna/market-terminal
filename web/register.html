<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Market Terminal — Register</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="auth-page">
  <form class="auth-card" id="form">
    <div class="auth-brand">
      <span class="logo">▌</span>
      <span>MARKET TERMINAL</span>
    </div>
    <h1>Create account</h1>
    <p class="sub">Research &amp; analytics · read-only, no broker keys</p>
    <!--CLOSED-->
    <label for="username">Username</label>
    <input id="username" name="username" autocomplete="username" minlength="3" autofocus required />
    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="new-password" minlength="8" required />
    <button type="submit" class="btn btn-primary">Sign up</button>
    <div id="msg"></div>
    <p class="auth-foot">Already have an account? <a href="/login">Sign in</a></p>
  </form>
  <script>
    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const u = document.getElementById("username").value.trim();
      const p = document.getElementById("password").value;
      const r = await fetch("/register", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({ username: u, password: p }),
        redirect: "manual",
      });
      if (r.type === "opaqueredirect" || r.status === 0 || r.ok) { window.location.href = "/"; return; }
      let detail = "Registration failed";
      try { detail = (await r.json()).detail || detail; } catch (e) { /* */ }
      document.getElementById("msg").innerHTML = '<div class="err-box">' + detail + '</div>';
    });
  </script>
</body>
</html>
