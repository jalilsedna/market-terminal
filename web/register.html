<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Market Terminal — Register</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: #0b0e14; color: #d7dce5;
      font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .card {
      width: min(360px, 92vw); padding: 28px 26px;
      background: #11151f; border: 1px solid #1f2633; border-radius: 10px;
      box-shadow: 0 12px 40px rgba(0,0,0,.4);
    }
    h1 { margin: 0 0 4px; font-size: 16px; letter-spacing: .5px; }
    .sub { margin: 0 0 20px; color: #6b7689; font-size: 12px; }
    label { display: block; margin: 14px 0 6px; color: #98a2b3; font-size: 12px; }
    input {
      width: 100%; padding: 10px 12px; border-radius: 7px;
      background: #0b0e14; border: 1px solid #29313f; color: #e8edf5; font: inherit;
    }
    input:focus { outline: none; border-color: #3b82f6; }
    button {
      width: 100%; margin-top: 22px; padding: 11px; border: 0; border-radius: 7px;
      background: #2563eb; color: #fff; font: inherit; font-weight: 600; cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    .err { margin: 14px 0 0; padding: 9px 11px; border-radius: 7px;
      background: #2a1416; border: 1px solid #5b1f23; color: #f4a7ac; font-size: 12px; }
    .foot { margin-top: 18px; color: #4b5566; font-size: 11px; text-align: center; }
    .foot a { color: #6b7689; }
    #msg { margin-top: 12px; font-size: 12px; }
  </style>
</head>
<body>
  <form class="card" id="form">
    <h1>Market Terminal</h1>
    <p class="sub">Create an account</p>
    <!--CLOSED-->
    <label for="username">Username</label>
    <input id="username" name="username" autocomplete="username" minlength="3" autofocus required />
    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="new-password" minlength="8" required />
    <button type="submit">Sign up</button>
    <div id="msg"></div>
    <p class="foot">Already have an account? <a href="/login">Sign in</a></p>
  </form>
  <script>
    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const u = document.getElementById("username").value.trim();
      const p = document.getElementById("password").value;
      const r = await fetch("/register", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({ username: u, password: p }),
        redirect: "manual",
      });
      if (r.type === "opaqueredirect" || r.status === 0 || r.ok) { window.location.href = "/"; return; }
      let detail = "Registration failed";
      try { detail = (await r.json()).detail || detail; } catch (e) { /* */ }
      document.getElementById("msg").innerHTML = '<span class="err">' + detail + '</span>';
    });
  </script>
</body>
</html>
